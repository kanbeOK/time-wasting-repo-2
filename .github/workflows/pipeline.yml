name: Polymarket Pipeline

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        default: "current"
        type: choice
        options: [full, current, history]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: polymarket_pipeline/requirements.txt

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r polymarket_pipeline/requirements.txt

      - name: Run Code
        run: python -m polymarket_pipeline.main --mode ${{ github.event.inputs.mode || 'current' }} --output-dir data

      - name: Save CSV to GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update Polymarket CSV"
          git push
